<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in | Housewarming</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Playfair+Display:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --peach: #f8e8d4;
            --blush: #f2c4b8;
            --rose: #d4828f;
            --sage: #b8ccb0;
            --cream: #faf6f0;
            --warm-white: #fefcf8;
            --charcoal: #2a2a2a;
            --brown: #5a3e2b;
            --brown-light: #8a6a50;
            --gold: #c9a84c;
            --coral: #e8886c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #fce4d6 0%, #e8d5e0 30%, #d4dce8 60%, #dce8d4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .checkin-card {
            background: var(--warm-white);
            border-radius: 24px;
            padding: 36px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(90,62,43,0.15);
            position: relative;
            overflow: hidden;
        }

        .checkin-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--sage), var(--rose), var(--gold), var(--coral));
            background-size: 300% 100%;
            animation: glow 6s ease infinite;
        }

        @keyframes glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .icon { font-size: 48px; margin-bottom: 12px; }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--charcoal);
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--brown-light);
            margin-bottom: 24px;
        }

        .info-box {
            background: var(--cream);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.04);
        }

        .info-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--rose);
            margin-bottom: 4px;
        }

        .info-value {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--charcoal);
        }

        .info-small {
            font-size: 12px;
            color: var(--brown-light);
            margin-top: 2px;
        }

        .status-box {
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .status-box.loading {
            background: #f0f4ff;
            border: 1px solid #c0d0ff;
        }

        .status-box.success {
            background: #e8f5e4;
            border: 1px solid #a0d090;
        }

        .status-box.error {
            background: #ffeee8;
            border: 1px solid #f0a090;
        }

        .status-box.waiting {
            background: var(--cream);
            border: 1px dashed var(--blush);
        }

        .status-icon { font-size: 36px; margin-bottom: 8px; }

        .status-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--charcoal);
            margin-bottom: 4px;
        }

        .status-detail {
            font-size: 13px;
            color: var(--brown-light);
        }

        .distance-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
        }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            border: none;
            border-radius: 50px;
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--charcoal), #3a3a3a);
            color: var(--gold);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-success {
            background: linear-gradient(135deg, #4caf50, #388e3c);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: var(--rose);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate { animation: fadeIn 0.5s ease both; }

        .footer-text {
            font-size: 11px;
            color: var(--brown-light);
            margin-top: 20px;
            opacity: 0.6;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--blush);
            border-radius: 10px;
            background: var(--warm-white);
            font-family: 'Sarabun', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--brown);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--rose), var(--coral));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(212,130,143,0.3);
        }

        .guest-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: var(--cream);
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1.5px solid transparent;
        }

        .guest-list-item:hover {
            border-color: var(--rose);
            transform: translateX(4px);
        }

        .guest-list-item.selected {
            background: linear-gradient(135deg, #fce4d6, #f5d0c0);
            border-color: var(--coral);
        }

        .guest-list-item .gli-name {
            font-weight: 700;
            color: var(--charcoal);
            font-size: 15px;
        }

        .guest-list-item .gli-meta {
            font-size: 11px;
            color: var(--brown-light);
        }

        .guest-list-item .gli-badge {
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 700;
            white-space: nowrap;
        }

        .gli-badge.morning { background: #ffeee4; color: var(--coral); }
        .gli-badge.evening { background: #ede4f5; color: #8a70b0; }
        .gli-badge.both { background: #e4f0e8; color: #5a8a5e; }

        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .confetti-burst {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .conf {
            position: absolute;
            animation: confFall 3s ease-out forwards;
            opacity: 0;
        }

        @keyframes confFall {
            0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

<div class="checkin-card" id="card">
    <div class="icon">🏠</div>
    <div class="title">Housewarming Check-in</div>
    <div class="subtitle">ลำพูนค้าไม้ — 28 March 2026</div>

    <!-- Tab Switch -->
    <div style="display:flex;gap:8px;margin-bottom:20px;">
        <button class="tab-btn active" id="tabQR" onclick="switchTab('qr')">🎫 สแกน QR</button>
        <button class="tab-btn" id="tabSearch" onclick="switchTab('search')">🔍 ค้นหาชื่อ</button>
    </div>

    <!-- QR Mode -->
    <div id="qrMode">
        <div class="info-box" id="guestInfo">
            <div class="info-label">ผู้เข้าร่วมงาน</div>
            <div class="info-value" id="guestName">กำลังโหลด...</div>
            <div class="info-small" id="guestMeta"></div>
        </div>

        <div id="statusArea">
            <div class="status-box waiting">
                <div class="status-icon">📍</div>
                <div class="status-text">กดปุ่มเพื่อ Check-in</div>
                <div class="status-detail">ระบบจะตรวจสอบตำแหน่งของท่าน<br>ต้องอยู่ในรัศมี 20 เมตรจากสถานที่จัดงาน</div>
            </div>
            <button class="btn btn-primary" id="checkinBtn" onclick="startCheckin()">
                📍 Check-in เข้างาน
            </button>
        </div>
    </div>

    <!-- Search Mode (for staff) -->
    <div id="searchMode" style="display:none;">
        <div style="background:#fff8f0;border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--brown);">
            🔐 <b>สำหรับ Staff เท่านั้น</b><br>ใช้กรณีแขกลืม QR Code
        </div>

        <button class="btn btn-primary" onclick="loadGuestList()" id="loadListBtn" style="width:100%;margin-bottom:14px;padding:12px;font-size:14px;">
            📋 ดึงรายชื่อผู้ลงทะเบียน
        </button>

        <!-- Search box -->
        <input type="text" id="searchInput" placeholder="🔍 พิมพ์ค้นหาชื่อ..." oninput="filterGuests()" style="width:100%;padding:12px 18px;font-family:'Sarabun',sans-serif;font-size:15px;border:2px solid #f2c4b8;border-radius:12px;outline:none;margin-bottom:10px;display:none;" />

        <!-- Guest List -->
        <div id="guestListContainer" style="max-height:35vh;overflow-y:auto;margin-bottom:14px;"></div>

        <!-- Manual entry fallback -->
        <div id="manualEntry" style="border-top:1px dashed var(--blush);padding-top:14px;margin-top:8px;">
            <div style="font-size:12px;color:var(--brown-light);margin-bottom:8px;">หรือกรอกชื่อเอง:</div>
            <input type="text" id="searchName" placeholder="ชื่อแขก..." style="width:100%;padding:12px 18px;font-family:'Sarabun',sans-serif;font-size:15px;border:2px solid #f2c4b8;border-radius:12px;outline:none;margin-bottom:8px;text-align:center;" />
            <input type="number" id="searchCount" placeholder="จำนวนคน" value="1" min="1" max="20" style="width:100%;padding:12px 18px;font-family:'Sarabun',sans-serif;font-size:15px;border:2px solid #f2c4b8;border-radius:12px;outline:none;margin-bottom:12px;text-align:center;" />
        </div>

        <div id="searchStatus"></div>

        <button class="btn btn-primary" onclick="staffCheckin()" style="width:100%;">
            📍 Check-in โดย Staff
        </button>
    </div>
</div>

<div class="confetti-burst" id="confetti"></div>

<script>
    // =============================================
    // ⚠️ ตั้งค่าพิกัดสถานที่จัดงาน ⚠️
    // เปลี่ยนค่านี้เป็นพิกัดจริงของ "ลำพูนค้าไม้"
    // หาพิกัดได้จาก Google Maps: คลิกขวาที่จุด → copy พิกัด
    // =============================================
    const VENUE_LAT = 18.5740;   // ← ใส่ Latitude ของสถานที่
    const VENUE_LNG = 99.0087;   // ← ใส่ Longitude ของสถานที่
    const MAX_DISTANCE_M = 20;   // รัศมี 20 เมตร
    
    // Google Apps Script URL (ใส่ URL เดียวกับ index.html)
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbw0oU4b3XFvZVhhtVKRnwav3Wn_t1BrXEE5UVc5cI22f1fwN3DWm5InlNJaAfYk22OC/exec';

    // =============================================
    
    // === GUEST LIST ===
    let allGuests = [];
    let selectedGuest = null;

    function loadGuestList() {
        const btn = document.getElementById('loadListBtn');
        btn.disabled = true;
        btn.textContent = '⏳ กำลังโหลด...';

        if (false) {
            btn.textContent = '❌ ยังไม่ได้ตั้งค่า URL';
            return;
        }

        fetch(SHEET_URL + '?action=getGuests')
            .then(r => r.json())
            .then(data => {
                allGuests = data.guests || [];
                btn.style.display = 'none';
                document.getElementById('searchInput').style.display = 'block';
                renderGuestList(allGuests);
            })
            .catch(err => {
                console.log('Load error:', err);
                btn.textContent = '🔄 โหลดไม่สำเร็จ กดลองอีกครั้ง';
                btn.disabled = false;
            });
    }

    function renderGuestList(guests) {
        const container = document.getElementById('guestListContainer');
        if (guests.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#8a6a50;font-size:13px;">ไม่พบรายชื่อ</div>';
            return;
        }

        container.innerHTML = guests.map((g, i) => {
            const sessionBadge = g.session === 'morning' ? '<span class="gli-badge morning">🌅 เช้า</span>' :
                                 g.session === 'evening' ? '<span class="gli-badge evening">🌙 ค่ำ</span>' :
                                 g.session === 'both' ? '<span class="gli-badge both">✨ ทั้งคู่</span>' : '';
            return `
                <div class="guest-list-item" onclick="selectGuest(${i})" id="gli_${i}">
                    <div>
                        <div class="gli-name">${g.name}</div>
                        <div class="gli-meta">${g.count} ท่าน ${g.allergy !== '-' ? '• ⚠️ แพ้: ' + g.allergy : ''}</div>
                    </div>
                    ${sessionBadge}
                </div>
            `;
        }).join('');

        container.innerHTML += `<div style="text-align:center;padding:8px;font-size:11px;color:#8a6a50;">ทั้งหมด ${guests.length} รายการ</div>`;
    }

    function filterGuests() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!q) {
            renderGuestList(allGuests);
            return;
        }
        const filtered = allGuests.filter(g =>
            g.name.toLowerCase().includes(q) ||
            g.regId.toLowerCase().includes(q)
        );
        renderGuestList(filtered);
    }

    function selectGuest(index) {
        // Deselect all
        document.querySelectorAll('.guest-list-item').forEach(el => el.classList.remove('selected'));
        
        const guests = document.getElementById('searchInput').value.trim() ?
            allGuests.filter(g => g.name.toLowerCase().includes(document.getElementById('searchInput').value.trim().toLowerCase())) :
            allGuests;
        
        selectedGuest = guests[index];
        document.getElementById('gli_' + index).classList.add('selected');
        
        // Fill manual fields as backup
        document.getElementById('searchName').value = selectedGuest.name;
        document.getElementById('searchCount').value = selectedGuest.count;
    }

    // Tab switching
    function switchTab(tab) {
        document.getElementById('qrMode').style.display = tab === 'qr' ? 'block' : 'none';
        document.getElementById('searchMode').style.display = tab === 'search' ? 'block' : 'none';
        document.getElementById('tabQR').classList.toggle('active', tab === 'qr');
        document.getElementById('tabSearch').classList.toggle('active', tab === 'search');
    }

    // Staff manual check-in
    function staffCheckin() {
        const name = selectedGuest ? selectedGuest.name : document.getElementById('searchName').value.trim();
        const count = selectedGuest ? selectedGuest.count : (document.getElementById('searchCount').value || '1');
        const rid = selectedGuest ? selectedGuest.regId : ('STAFF-' + Date.now().toString(36).toUpperCase());

        if (!name) {
            document.getElementById('searchStatus').innerHTML = `
                <div class="status-box error animate" style="margin-bottom:12px;">
                    <div class="status-text" style="color:#c62828;font-size:14px;">กรุณากรอกชื่อแขก</div>
                </div>`;
            return;
        }

        document.getElementById('searchStatus').innerHTML = `
            <div class="status-box loading animate" style="margin-bottom:12px;">
                <div><div class="spinner"></div></div>
                <div class="status-text" style="margin-top:8px;font-size:14px;">กำลังตรวจสอบตำแหน่ง...</div>
            </div>`;

        if (!navigator.geolocation) {
            document.getElementById('searchStatus').innerHTML = `
                <div class="status-box error animate" style="margin-bottom:12px;">
                    <div class="status-text" style="color:#c62828;font-size:14px;">เบราว์เซอร์ไม่รองรับ GPS</div>
                </div>`;
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const dist = getDistance(pos.coords.latitude, pos.coords.longitude, VENUE_LAT, VENUE_LNG);
                const distR = Math.round(dist);

                if (dist <= MAX_DISTANCE_M) {
                    // Send to sheet
                    if (true) {
                        var staffPayload = {
                                action: 'checkin',
                                regId: rid,
                                name: name,
                                count: count,
                                distance: distR + 'm',
                                checkinTime: new Date().toLocaleString('th-TH'),
                                note: selectedGuest ? 'Staff check-in (จากรายชื่อ)' : 'Staff check-in (กรอกเอง)'
                            };
                            var img3 = new Image();
                            img3.src = SHEET_URL + '?action=checkin&data=' + encodeURIComponent(JSON.stringify(staffPayload));
                    }

                    document.getElementById('searchStatus').innerHTML = `
                        <div class="status-box success animate" style="margin-bottom:12px;">
                            <div class="status-icon" style="animation:successPulse 1s ease infinite;">✅</div>
                            <div class="status-text" style="color:#2e7d32;">${name}</div>
                            <div class="status-detail">Check-in สำเร็จ! • ${count} ท่าน • ${distR}m</div>
                        </div>`;
                    launchConfetti();

                    // Reset form after 3s
                    setTimeout(() => {
                        document.getElementById('searchName').value = '';
                        document.getElementById('searchCount').value = '1';
                        selectedGuest = null;
                        document.querySelectorAll('.guest-list-item').forEach(el => el.classList.remove('selected'));
                        document.getElementById('searchStatus').innerHTML = '';
                    }, 3000);
                } else {
                    document.getElementById('searchStatus').innerHTML = `
                        <div class="status-box error animate" style="margin-bottom:12px;">
                            <div class="status-text" style="color:#c62828;">อยู่นอกรัศมี (${distR}m)</div>
                            <div class="status-detail">ต้องอยู่ภายใน ${MAX_DISTANCE_M} เมตร</div>
                        </div>`;
                }
            },
            (err) => {
                document.getElementById('searchStatus').innerHTML = `
                    <div class="status-box error animate" style="margin-bottom:12px;">
                        <div class="status-text" style="color:#c62828;">ไม่สามารถระบุตำแหน่งได้</div>
                        <div class="status-detail">กรุณาเปิด GPS แล้วลองอีกครั้ง</div>
                    </div>`;
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
    }

    // Read URL params
    const params = new URLSearchParams(window.location.search);
    const regId = params.get('id') || '';
    const guestName = decodeURIComponent(params.get('name') || 'ไม่ระบุ');
    const guestCount = params.get('count') || '1';

    // Display guest info
    document.getElementById('guestName').textContent = guestName;
    document.getElementById('guestMeta').textContent = 'ID: ' + regId + ' • ' + guestCount + ' ท่าน';

    if (!regId) {
        document.getElementById('statusArea').innerHTML = `
            <div class="status-box error">
                <div class="status-icon">❌</div>
                <div class="status-text">QR Code ไม่ถูกต้อง</div>
                <div class="status-detail">กรุณาใช้ QR Code ที่ได้จากการลงทะเบียน</div>
            </div>
        `;
    }

    // Calculate distance between two coordinates (Haversine formula)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000; // meters
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function launchConfetti() {
        const container = document.getElementById('confetti');
        const colors = ['#f2c4b8','#b8d4e3','#c4b8d9','#b8ccb0','#e8886c','#c9a84c','#d4828f'];
        for (let i = 0; i < 60; i++) {
            const c = document.createElement('div');
            c.classList.add('conf');
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * 10 + 6;
            const shapes = ['50%', '2px', 'polygon(50% 0%, 0% 100%, 100% 100%)'];
            const shape = shapes[Math.floor(Math.random() * shapes.length)];
            c.style.cssText = `left:${Math.random()*100}%;top:-10px;width:${size}px;height:${size}px;background:${color};border-radius:${shape.includes('polygon')?'0':shape};clip-path:${shape.includes('polygon')?shape:'none'};animation-delay:${Math.random()*0.8}s;animation-duration:${Math.random()*2+2}s;`;
            container.appendChild(c);
            setTimeout(() => c.remove(), 4000);
        }
    }

    function startCheckin() {
        const btn = document.getElementById('checkinBtn');
        btn.disabled = true;
        
        document.getElementById('statusArea').innerHTML = `
            <div class="status-box loading animate">
                <div><div class="spinner"></div></div>
                <div class="status-text" style="margin-top:12px;">กำลังตรวจสอบตำแหน่ง...</div>
                <div class="status-detail">กรุณาอนุญาตการเข้าถึง GPS</div>
            </div>
        `;

        if (!navigator.geolocation) {
            showError('เบราว์เซอร์ไม่รองรับ GPS', 'กรุณาใช้ Chrome หรือ Safari');
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const userLat = pos.coords.latitude;
                const userLng = pos.coords.longitude;
                const distance = getDistance(userLat, userLng, VENUE_LAT, VENUE_LNG);
                const distanceRounded = Math.round(distance);

                if (distance <= MAX_DISTANCE_M) {
                    // SUCCESS - Within range
                    checkinSuccess(distanceRounded);
                } else {
                    // FAIL - Too far
                    showError(
                        'อยู่นอกรัศมีสถานที่จัดงาน',
                        `ระยะห่าง: ${distanceRounded} เมตร (ต้องอยู่ภายใน ${MAX_DISTANCE_M} เมตร)<br>กรุณาเดินเข้าใกล้สถานที่จัดงานแล้วลองอีกครั้ง`,
                        true
                    );
                }
            },
            (err) => {
                let msg = 'ไม่สามารถระบุตำแหน่งได้';
                if (err.code === 1) msg = 'กรุณาอนุญาตการเข้าถึงตำแหน่ง (GPS)';
                if (err.code === 2) msg = 'ไม่สามารถระบุตำแหน่งได้ ลองเปิด GPS';
                if (err.code === 3) msg = 'หมดเวลาในการระบุตำแหน่ง';
                showError(msg, 'ตรวจสอบการตั้งค่า GPS แล้วลองอีกครั้ง', true);
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
    }

    function checkinSuccess(distance) {
        // Send to Google Sheet
        var ciData = {
            action: 'checkin',
            regId: regId,
            name: guestName,
            count: guestCount,
            distance: distance + 'm',
            checkinTime: new Date().toLocaleString('th-TH')
        };
        var img2 = new Image();
        img2.src = SHEET_URL + '?action=checkin&data=' + encodeURIComponent(JSON.stringify(ciData));
        console.log('Checkin sent!', ciData);

        document.getElementById('statusArea').innerHTML = `
            <div class="status-box success animate">
                <div class="status-icon" style="animation: successPulse 1s ease infinite;">✅</div>
                <div class="status-text" style="color:#2e7d32;">Check-in สำเร็จ!</div>
                <div class="status-detail">ยินดีต้อนรับสู่งาน Housewarming</div>
                <div class="distance-badge" style="background:#c8e6c9;color:#2e7d32;">
                    📍 ระยะห่าง ${distance} เมตร
                </div>
            </div>
            <div style="margin-top:16px;font-size:13px;color:var(--brown-light);">
                ⏰ ${new Date().toLocaleString('th-TH')}<br>
                ขอให้สนุกกับงานครับ! 🎉
            </div>
        `;
        
        launchConfetti();
    }

    function showError(title, detail, showRetry) {
        let html = `
            <div class="status-box error animate">
                <div class="status-icon">❌</div>
                <div class="status-text" style="color:#c62828;">${title}</div>
                <div class="status-detail">${detail}</div>
            </div>
        `;
        if (showRetry) {
            html += `<button class="btn btn-primary" onclick="startCheckin()" style="margin-top:12px;">🔄 ลองอีกครั้ง</button>`;
        }
        document.getElementById('statusArea').innerHTML = html;
    }
</script>

</body>
</html>
