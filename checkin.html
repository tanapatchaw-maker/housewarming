<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Check-in | Housewarming</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Playfair+Display:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --dark-green: #0A3323;
            --moss: #839958;
            --beige: #F7F4D5;
            --rosy: #D3968C;
            --midnight: #105666;
            --cream: #faf8f4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(180deg, var(--dark-green) 0%, var(--midnight) 30%, var(--dark-green) 60%, var(--midnight) 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            position: relative; overflow: hidden;
        }

        /* === POND BACKGROUND === */
        .pond-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden; pointer-events: none;
        }
        .pond-bg::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(131,153,88,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(16,86,102,0.4) 0%, transparent 50%);
            animation: pondShift 12s ease-in-out infinite alternate;
        }
        @keyframes pondShift { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .ripple {
            position: absolute; border-radius: 50%;
            border: 1px solid rgba(247,244,213,0.12);
            animation: rippleOut 6s ease-out infinite;
        }
        @keyframes rippleOut { 0% { transform: scale(0); opacity: 0.5; } 100% { transform: scale(4); opacity: 0; } }

        .lotus {
            position: absolute; font-size: 24px;
            animation: lotusFloat 8s ease-in-out infinite;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
        }
        @keyframes lotusFloat {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }

        .water-sparkle {
            position: absolute; width: 3px; height: 3px;
            background: radial-gradient(circle, rgba(247,244,213,0.8), transparent);
            border-radius: 50%; animation: sparkleGlow 3s ease-in-out infinite;
        }
        @keyframes sparkleGlow { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.5); } }

        .firefly {
            position: absolute; width: 5px; height: 5px;
            background: radial-gradient(circle, rgba(247,244,213,0.7), rgba(211,150,140,0.3), transparent);
            border-radius: 50%; animation: fireflyMove 8s ease-in-out infinite;
        }
        @keyframes fireflyMove {
            0% { transform: translate(0, 0); opacity: 0; }
            20% { opacity: 0.7; }
            50% { transform: translate(25px, -35px); opacity: 0.3; }
            80% { opacity: 0.8; }
            100% { transform: translate(-15px, -50px); opacity: 0; }
        }

        /* === CARD === */
        .card {
            background: rgba(247,244,213,0.95); border-radius: 24px; padding: 32px 24px;
            max-width: 440px; width: 100%; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(247,244,213,0.1);
            position: relative; overflow: hidden; z-index: 1;
            backdrop-filter: blur(10px);
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--moss), var(--rosy), var(--midnight), var(--moss));
            background-size: 300% 100%; animation: glow 6s ease infinite;
        }
        @keyframes glow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes successPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.1); } }

        .icon { font-size: 44px; margin-bottom: 6px; }
        .title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--dark-green); margin-bottom: 2px; }
        .subtitle { font-size: 13px; color: var(--moss); margin-bottom: 18px; }

        .tab-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-btn {
            flex: 1; padding: 10px; border: 2px solid var(--moss); border-radius: 10px;
            background: transparent; font-family: 'Sarabun', sans-serif;
            font-size: 14px; font-weight: 700; color: var(--dark-green); cursor: pointer; transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--dark-green), var(--midnight)); color: var(--beige);
            border-color: transparent; box-shadow: 0 4px 12px rgba(10,51,35,0.3);
        }

        .info-box {
            background: rgba(131,153,88,0.1); border-radius: 14px; padding: 16px; margin-bottom: 14px;
            border: 1px solid rgba(131,153,88,0.2); animation: fadeIn 0.4s ease both;
        }
        .info-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--rosy); margin-bottom: 3px; }
        .info-value { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--dark-green); }
        .info-small { font-size: 11px; color: var(--moss); margin-top: 2px; }

        .status-box { border-radius: 14px; padding: 18px; margin-bottom: 14px; animation: fadeIn 0.4s ease both; }
        .status-box.success { background: rgba(131,153,88,0.15); border: 1px solid rgba(131,153,88,0.3); }
        .status-box.error { background: rgba(211,150,140,0.15); border: 1px solid rgba(211,150,140,0.3); }
        .status-box.info { background: rgba(16,86,102,0.1); border: 1px solid rgba(16,86,102,0.2); }
        .status-icon { font-size: 32px; margin-bottom: 6px; }
        .status-text { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
        .status-detail { font-size: 12px; color: var(--moss); }

        .btn {
            display: inline-block; padding: 13px 32px; border: none; border-radius: 50px;
            font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: all 0.3s; width: 100;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--dark-green), var(--midnight)); color: var(--beige);
            box-shadow: 0 4px 15px rgba(10,51,35,0.3);
        }
        .btn-success {
            background: linear-gradient(135deg, var(--moss), #6a8a48); color: white;
            box-shadow: 0 4px 15px rgba(131,153,88,0.3);
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        #qrReader { border-radius: 12px; overflow: hidden; margin-bottom: 14px; }

        .search-input {
            width: 100%; padding: 11px 16px; font-family: 'Sarabun', sans-serif; font-size: 14px;
            border: 2px solid rgba(131,153,88,0.3); border-radius: 10px; outline: none;
            margin-bottom: 8px; background: rgba(247,244,213,0.5); color: var(--dark-green);
        }
        .search-input:focus { border-color: var(--rosy); }
        .search-input::placeholder { color: var(--moss); }

        .guest-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; background: rgba(131,153,88,0.08); border-radius: 10px;
            margin-bottom: 5px; cursor: pointer; transition: all 0.2s; border: 1.5px solid transparent; text-align: left;
        }
        .guest-item:hover { border-color: var(--rosy); transform: translateX(4px); }
        .guest-item.selected { background: rgba(211,150,140,0.15); border-color: var(--rosy); }
        .g-name { font-weight: 700; color: var(--dark-green); font-size: 14px; }
        .g-meta { font-size: 10px; color: var(--moss); }
        .g-badge { font-size: 9px; padding: 2px 8px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
        .g-badge.morning { background: rgba(211,150,140,0.2); color: var(--rosy); }
        .g-badge.evening { background: rgba(16,86,102,0.15); color: var(--midnight); }
        .g-badge.both { background: rgba(131,153,88,0.15); color: var(--moss); }

        .confetti-burst { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 999; overflow: hidden; }
        .conf { position: absolute; animation: confFall 3s ease-out forwards; opacity: 0; }
        @keyframes confFall { 0% { opacity:1; transform:translateY(-20px) rotate(0); } 100% { opacity:0; transform:translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body>

    <!-- Animated Pond Background -->
    <div class="pond-bg">
        <div class="ripple" style="top:25%;left:15%;width:50px;height:50px;animation-delay:0s;"></div>
        <div class="ripple" style="top:65%;right:20%;width:70px;height:70px;animation-delay:2s;"></div>
        <div class="ripple" style="bottom:30%;left:50%;width:45px;height:45px;animation-delay:4s;"></div>

        <div class="lotus" style="top:12%;left:6%;animation-delay:0s;animation-duration:7s;">🪷</div>
        <div class="lotus" style="top:50%;right:4%;animation-delay:2s;animation-duration:9s;">🌸</div>
        <div class="lotus" style="bottom:15%;left:10%;animation-delay:1s;animation-duration:8s;">🪷</div>

        <div class="water-sparkle" style="top:15%;left:35%;animation-delay:0s;"></div>
        <div class="water-sparkle" style="top:40%;right:20%;animation-delay:1s;"></div>
        <div class="water-sparkle" style="top:70%;left:55%;animation-delay:0.5s;"></div>
        <div class="water-sparkle" style="top:85%;right:40%;animation-delay:2s;"></div>
        <div class="water-sparkle" style="top:30%;left:15%;animation-delay:1.5s;"></div>

        <div class="firefly" style="top:25%;left:25%;animation-delay:0s;animation-duration:7s;"></div>
        <div class="firefly" style="top:55%;right:25%;animation-delay:2s;animation-duration:9s;"></div>
        <div class="firefly" style="bottom:30%;left:50%;animation-delay:4s;animation-duration:8s;"></div>
    </div>

<div class="card">
    <div class="icon">🪷</div>
    <div class="title">Staff Check-in</div>
    <div class="subtitle">Ariston White Haus — 28 March 2026</div>

    <div class="tab-row">
        <button class="tab-btn active" id="tabScan" onclick="switchTab('scan')">📷 สแกน QR</button>
        <button class="tab-btn" id="tabSearch" onclick="switchTab('search')">🔍 ค้นหาชื่อ</button>
    </div>

    <!-- Scan Mode -->
    <div id="scanMode">
        <div id="qrReader"></div>
        <div id="scanResult"></div>
        <button class="btn btn-success" id="scanCheckinBtn" onclick="scanCheckin()" style="display:none;">✅ Check-in</button>
    </div>

    <!-- Search Mode -->
    <div id="searchMode" style="display:none;">
        <div style="background:rgba(131,153,88,0.1);border-radius:10px;padding:10px;margin-bottom:12px;font-size:11px;color:var(--dark-green);">
            🔐 <b>สำหรับ Staff</b> — กรณีแขกลืม QR Code
        </div>
        <button class="btn btn-primary" onclick="loadGuests()" id="loadBtn" style="margin-bottom:10px;">📋 ดึงรายชื่อผู้ลงทะเบียน</button>
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 พิมพ์ค้นหาชื่อ..." oninput="filterGuests()" style="display:none;" />
        <div id="guestList" style="max-height:32vh;overflow-y:auto;margin-bottom:10px;"></div>
        <div id="searchStatus"></div>
        <button class="btn btn-success" id="staffBtn" onclick="staffCheckin()" style="display:none;">✅ Check-in</button>
    </div>
</div>

<div class="confetti-burst" id="confetti"></div>

<script>
    var SHEET_URL = 'https://script.google.com/macros/s/AKfycbzsEClTcPc7dWAa0Ymrl9m2If8PqtHrPTGiAhUTD_SWfu_h_rbys7b6HEAKlfouYGS9/exec';
    var allGuests = [];
    var selectedGuest = null;
    var scannedGuest = null;
    var scanner = null;

    function initScanner() {
        scanner = new Html5Qrcode("qrReader");
        scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 200, height: 200 } },
            onScanSuccess,
            function() {}
        ).catch(function(err) {
            document.getElementById('scanResult').innerHTML = '<div class="status-box error"><div class="status-text" style="color:#c62828;">ไม่สามารถเปิดกล้องได้</div><div class="status-detail">กรุณาอนุญาตกล้อง หรือใช้แท็บ "ค้นหาชื่อ"</div></div>';
        });
    }

    function onScanSuccess(decodedText) {
        scanner.stop().then(function() { document.getElementById('qrReader').innerHTML = ''; }).catch(function() {});
        var scannedId = decodedText.trim();
        document.getElementById('scanResult').innerHTML = '<div class="status-box info"><div class="status-text" style="color:var(--midnight);">🔍 กำลังค้นหา: ' + scannedId + '</div></div>';

        fetch(SHEET_URL + '?action=getGuests')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var guests = data.guests || [];
                var found = null;
                for (var i = 0; i < guests.length; i++) {
                    if (guests[i].regId === scannedId) { found = guests[i]; break; }
                }
                if (found) {
                    scannedGuest = found;
                    var allergyText = found.allergy && found.allergy !== '-' ? '<br>⚠️ แพ้อาหาร: ' + found.allergy : '';
                    var badge = found.session === 'morning' ? '🌅 เช้า' : found.session === 'evening' ? '🌙 ค่ำ' : found.session === 'both' ? '✨ ทั้งสองช่วง' : '';
                    document.getElementById('scanResult').innerHTML =
                        '<div class="info-box"><div class="info-label">พบข้อมูลผู้ลงทะเบียน</div><div class="info-value">' + found.name + '</div><div class="info-small">ID: ' + found.regId + ' • ' + found.count + ' ท่าน • ' + badge + allergyText + '</div></div>';
                    document.getElementById('scanCheckinBtn').style.display = 'block';
                } else {
                    document.getElementById('scanResult').innerHTML = '<div class="status-box error"><div class="status-icon">❌</div><div class="status-text" style="color:var(--rosy);">ไม่พบรหัสนี้</div><div class="status-detail">รหัส: ' + scannedId + '</div></div>';
                    document.getElementById('scanCheckinBtn').style.display = 'none';
                    setTimeout(function() { restartScanner(); }, 3000);
                }
            })
            .catch(function() {
                document.getElementById('scanResult').innerHTML = '<div class="status-box error"><div class="status-text" style="color:var(--rosy);">โหลดข้อมูลไม่สำเร็จ</div></div>';
                setTimeout(function() { restartScanner(); }, 3000);
            });
    }

    function scanCheckin() {
        if (!scannedGuest) return;
        var btn = document.getElementById('scanCheckinBtn');
        btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
        var g = scannedGuest;
        sendCheckin(g.regId, g.name, g.count, 'QR Scan',
            function() {
                document.getElementById('scanResult').innerHTML =
                    '<div class="status-box success"><div class="status-icon" style="animation:successPulse 1s ease infinite;">✅</div><div class="status-text" style="color:var(--dark-green);">Check-in สำเร็จ!</div><div class="status-detail">' + g.name + ' • ' + g.count + ' ท่าน<br>⏰ ' + new Date().toLocaleString('th-TH') + '</div></div>';
                btn.textContent = '✅ เสร็จแล้ว'; launchConfetti();
                setTimeout(function() { scannedGuest = null; btn.style.display = 'none'; btn.disabled = false; document.getElementById('scanResult').innerHTML = ''; restartScanner(); }, 3000);
            },
            function(prevTime) {
                document.getElementById('scanResult').innerHTML =
                    '<div class="status-box error"><div class="status-icon">⚠️</div><div class="status-text" style="color:var(--rosy);">เคย Check-in แล้ว!</div><div class="status-detail">' + g.name + '<br>เมื่อ: ' + prevTime + '</div></div>';
                btn.style.display = 'none';
                setTimeout(function() { scannedGuest = null; btn.disabled = false; document.getElementById('scanResult').innerHTML = ''; restartScanner(); }, 3000);
            }
        );
    }

    function restartScanner() { document.getElementById('qrReader').innerHTML = ''; initScanner(); }
    initScanner();

    function switchTab(tab) {
        document.getElementById('scanMode').style.display = tab === 'scan' ? 'block' : 'none';
        document.getElementById('searchMode').style.display = tab === 'search' ? 'block' : 'none';
        document.getElementById('tabScan').classList.toggle('active', tab === 'scan');
        document.getElementById('tabSearch').classList.toggle('active', tab === 'search');
        if (tab === 'scan') { restartScanner(); } else { if (scanner) scanner.stop().catch(function() {}); }
    }

    function loadGuests() {
        var btn = document.getElementById('loadBtn');
        btn.disabled = true; btn.textContent = '⏳ กำลังโหลด...';
        fetch(SHEET_URL + '?action=getGuests')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                allGuests = data.guests || [];
                btn.style.display = 'none';
                document.getElementById('searchInput').style.display = 'block';
                renderList(allGuests);
            })
            .catch(function() { btn.textContent = '🔄 ลองอีกครั้ง'; btn.disabled = false; });
    }

    function renderList(guests) {
        var c = document.getElementById('guestList');
        if (guests.length === 0) { c.innerHTML = '<div style="text-align:center;padding:16px;color:var(--moss);font-size:12px;">ไม่พบรายชื่อ</div>'; return; }
        var html = '';
        var checkedCount = 0;
        for (var i = 0; i < guests.length; i++) {
            var g = guests[i];
            var isChecked = g.checkedIn;
            if (isChecked) checkedCount++;
            var badge = g.session === 'morning' ? '<span class="g-badge morning">🌅 เช้า</span>' :
                        g.session === 'evening' ? '<span class="g-badge evening">🌙 ค่ำ</span>' :
                        g.session === 'both' ? '<span class="g-badge both">✨ ทั้งคู่</span>' : '';
            var at = g.allergy && g.allergy !== '-' ? ' • ⚠️ ' + g.allergy : '';
            var statusBadge = isChecked ? '<span style="font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;background:rgba(131,153,88,0.2);color:var(--moss);">✅ เข้างานแล้ว</span>' : '<span style="font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;background:rgba(211,150,140,0.15);color:var(--rosy);">⏳ ยังไม่มา</span>';
            var itemStyle = isChecked ? 'opacity:0.6;' : '';
            html += '<div class="guest-item" onclick="selectGuest(' + i + ')" id="gi_' + i + '" style="' + itemStyle + '"><div><div class="g-name">' + g.name + ' ' + statusBadge + '</div><div class="g-meta">' + g.count + ' ท่าน' + at + '</div></div>' + badge + '</div>';
        }
        html += '<div style="text-align:center;padding:8px;font-size:10px;color:var(--moss);">ทั้งหมด ' + guests.length + ' รายการ • เข้างานแล้ว ' + checkedCount + ' รายการ</div>';
        c.innerHTML = html;
    }

    function filterGuests() {
        var q = document.getElementById('searchInput').value.trim().toLowerCase();
        var filtered = q ? allGuests.filter(function(g) { return g.name.toLowerCase().indexOf(q) !== -1; }) : allGuests;
        renderList(filtered);
        selectedGuest = null; document.getElementById('staffBtn').style.display = 'none';
    }

    function selectGuest(index) {
        document.querySelectorAll('.guest-item').forEach(function(el) { el.classList.remove('selected'); });
        var q = document.getElementById('searchInput').value.trim().toLowerCase();
        var list = q ? allGuests.filter(function(g) { return g.name.toLowerCase().indexOf(q) !== -1; }) : allGuests;
        selectedGuest = list[index];
        document.getElementById('gi_' + index).classList.add('selected');
        var btn = document.getElementById('staffBtn');
        btn.style.display = 'block'; btn.disabled = false;
        btn.textContent = '✅ Check-in: ' + selectedGuest.name;
        document.getElementById('searchStatus').innerHTML = '';
    }

    function staffCheckin() {
        if (!selectedGuest) return;
        var btn = document.getElementById('staffBtn');
        btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
        var g = selectedGuest;
        sendCheckin(g.regId, g.name, g.count, 'Staff ค้นหาชื่อ',
            function() {
                document.getElementById('searchStatus').innerHTML =
                    '<div class="status-box success"><div class="status-icon" style="animation:successPulse 1s ease infinite;">✅</div><div class="status-text" style="color:var(--dark-green);">' + g.name + '</div><div class="status-detail">Check-in สำเร็จ! • ' + g.count + ' ท่าน<br>⏰ ' + new Date().toLocaleString('th-TH') + '</div></div>';
                launchConfetti();
                setTimeout(function() { selectedGuest = null; btn.style.display = 'none'; document.querySelectorAll('.guest-item').forEach(function(el) { el.classList.remove('selected'); }); document.getElementById('searchStatus').innerHTML = ''; }, 3000);
            },
            function(prevTime) {
                document.getElementById('searchStatus').innerHTML =
                    '<div class="status-box error"><div class="status-icon">⚠️</div><div class="status-text" style="color:var(--rosy);">เคย Check-in แล้ว!</div><div class="status-detail">' + g.name + '<br>เมื่อ: ' + prevTime + '</div></div>';
                setTimeout(function() { selectedGuest = null; btn.style.display = 'none'; document.querySelectorAll('.guest-item').forEach(function(el) { el.classList.remove('selected'); }); document.getElementById('searchStatus').innerHTML = ''; }, 3000);
            }
        );
    }

    function sendCheckin(id, name, count, note, onSuccess, onDuplicate) {
        var payload = { action: 'checkin', regId: id, name: name, count: count, checkinTime: new Date().toLocaleString('th-TH'), note: note || '' };
        fetch(SHEET_URL + '?action=checkin&data=' + encodeURIComponent(JSON.stringify(payload)))
            .then(function(r) { return r.json(); })
            .then(function(result) {
                if (result.status === 'duplicate') { if (onDuplicate) onDuplicate(result.checkinTime); }
                else { if (onSuccess) onSuccess(); }
            })
            .catch(function() { if (onSuccess) onSuccess(); });
    }

    function launchConfetti() {
        var c = document.getElementById('confetti');
        var colors = ['#839958','#D3968C','#F7F4D5','#105666','#0A3323','#b8d0b0','#f0c4bc'];
        for (var i = 0; i < 60; i++) {
            var el = document.createElement('div'); el.classList.add('conf');
            el.style.cssText = 'left:' + Math.random()*100 + '%;top:-10px;width:' + (Math.random()*10+6) + 'px;height:' + (Math.random()*10+6) + 'px;background:' + colors[Math.floor(Math.random()*colors.length)] + ';border-radius:50%;animation-delay:' + Math.random()*0.8 + 's;animation-duration:' + (Math.random()*2+2) + 's;';
            c.appendChild(el);
            setTimeout(function() { el.remove(); }, 4000);
        }
    }
</script>
